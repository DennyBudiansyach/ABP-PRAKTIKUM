<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApteKarsidenan – Data Obat</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Custom CSS -->
  <link href="style.css" rel="stylesheet" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-4">
  <a class="navbar-brand fw-800" href="index.html">
    <i class="bi bi-capsule-pill me-2"></i>ApteKarsidenan
  </a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navMenu">
    <ul class="navbar-nav ms-auto gap-1">
      <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>Dashboard</a></li>
      <li class="nav-item"><a class="nav-link active" href="data.html"><i class="bi bi-table me-1"></i>Data Obat</a></li>
      <li class="nav-item"><a class="nav-link" href="form.html"><i class="bi bi-plus-circle me-1"></i>Tambah Obat</a></li>
    </ul>
  </div>
</nav>

<!--  HEADER  -->
<div class="page-header">
  <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div>
      <h3 class="fw-700 mb-0">Data Obat</h3>
      <small class="text-muted">Daftar seluruh obat yang tersedia di apotek</small>
    </div>
    <a href="form.html" class="btn btn-primary-custom">
      <i class="bi bi-plus-circle me-1"></i>Tambah Obat
    </a>
  </div>
</div>

<!--  TABEL  -->
<div class="container my-4">
  <div class="card-modern p-4">
    <div class="table-responsive">
      <table id="tabelObat" class="table table-hover align-middle w-100">
        <thead>
          <tr>
            <th>#</th>
            <th>Nama Obat</th>
            <th>Kategori</th>
            <th>Stok</th>
            <th>Harga</th>
            <th>Kadaluarsa</th>
            <th class="text-center">Aksi</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL EDIT -->
<div class="modal fade" id="modalEdit" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modal-modern">

      <div class="modal-header">
        <h5 class="modal-title fw-700"><i class="bi bi-pencil-square me-2"></i>Edit Data Obat</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body p-4">
        <input type="hidden" id="editId" />

        <div class="mb-3">
          <label class="form-label fw-600">Nama Obat</label>
          <input type="text" id="editNama" class="form-control form-modern" />
        </div>
        <div class="mb-3">
          <label class="form-label fw-600">Kategori</label>
          <select id="editKategori" class="form-select form-modern">
            <option>Analgesik</option>
            <option>Antibiotik</option>
            <option>Suplemen</option>
            <option>Antasida</option>
            <option>Antihistamin</option>
            <option>Lainnya</option>
          </select>
        </div>
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label fw-600">Stok</label>
            <input type="number" id="editStok" class="form-control form-modern" min="0" />
          </div>
          <div class="col-6">
            <label class="form-label fw-600">Harga (Rp)</label>
            <input type="number" id="editHarga" class="form-control form-modern" min="0" />
          </div>
        </div>
        <div class="mt-3">
          <label class="form-label fw-600">Tanggal Kadaluarsa</label>
          <input type="date" id="editKadaluarsa" class="form-control form-modern" />
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button type="button" class="btn btn-primary-custom" id="btnSimpanEdit">
          <i class="bi bi-check-circle me-1"></i>Simpan
        </button>
      </div>

    </div>
  </div>
</div>

<!-- MODAL HAPUS -->
<div class="modal fade" id="modalHapus" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content modal-modern text-center p-4">
      <div class="delete-icon mb-3"><i class="bi bi-trash3"></i></div>
      <h5 class="fw-700">Hapus Obat?</h5>
      <p class="text-muted small mb-4">Data yang dihapus tidak bisa dikembalikan.</p>
      <input type="hidden" id="hapusId" />
      <div class="d-flex gap-2 justify-content-center">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-danger" id="btnKonfirmasiHapus">Ya, Hapus</button>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer-bar text-center py-3 mt-4">
  <small>© 2025 ApteKarsidenan · by Node.js & Bootstrap</small>
</footer>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- DataTables jQuery Plugin -->
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<!-- SweetAlert2 jQuery Plugin  -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
//  Inisialisasi DataTable & muat data dari API 

let tabel;

$(document).ready(function () {

  //  DataTable data API (JSON)
  tabel = $('#tabelObat').DataTable({
    ajax: {
      url: '/api/obat', // data JSON server
      dataSrc: ''             
    },
    columns: [
      { data: 'id' },
      { data: 'nama' },
      {
        data: 'kategori',
        render: (val) => `<span class="badge-kategori">${val}</span>`
      },
      {
        data: 'stok',
        render: (val) => {
          const cls = val < 50 ? 'stok-rendah fw-600' : 'stok-aman fw-600';
          return `<span class="${cls}">${val}</span>`;
        }
      },
      {
        data: 'harga',
        render: (val) => 'Rp ' + val.toLocaleString('id-ID')
      },
      {
        data: 'kadaluarsa',
        render: (val) => {
          const selisih = (new Date(val) - new Date()) / (1000 * 60 * 60 * 24);
          const cls     = selisih < 30 ? 'kadaluarsa-dekat' : 'teks-muted-tabel';
          return `<span class="${cls}">${val}</span>`;
        }
      },
      {
        data: 'id',
        orderable: false,
        className: 'text-center',
        render: (id, type, row) => `
          <button class="btn btn-sm btn-edit me-1"
                  data-id="${id}"
                  data-nama="${row.nama}"
                  data-kategori="${row.kategori}"
                  data-stok="${row.stok}"
                  data-harga="${row.harga}"
                  data-kadaluarsa="${row.kadaluarsa}">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-sm btn-hapus" data-id="${id}">
            <i class="bi bi-trash3"></i>
          </button>
        `
      }
    ],
    language: {
      search:      'Cari:',
      lengthMenu:  'Tampilkan _MENU_ data',
      info:        'Menampilkan _START_–_END_ dari _TOTAL_ obat',
      emptyTable:  'Tidak ada data obat',
      paginate:    { previous: '‹', next: '›' }
    },
    pageLength: 10,
    order: [[0, 'asc']]
  });

});

// Klik tombol EDIT → isi modal 
$(document).on('click', '.btn-edit', function () {
  const d = $(this).data();
  $('#editId').val(d.id);
  $('#editNama').val(d.nama);
  $('#editKategori').val(d.kategori);
  $('#editStok').val(d.stok);
  $('#editHarga').val(d.harga);
  $('#editKadaluarsa').val(d.kadaluarsa);
  new bootstrap.Modal('#modalEdit').show();
});

// Simpan edit via PUT 
$('#btnSimpanEdit').on('click', function () {
  const id = $('#editId').val();

  $.ajax({
    url    : `/api/obat/${id}`,
    method : 'PUT',
    contentType: 'application/json',
    data   : JSON.stringify({
      nama       : $('#editNama').val(),
      kategori   : $('#editKategori').val(),
      stok       : $('#editStok').val(),
      harga      : $('#editHarga').val(),
      kadaluarsa : $('#editKadaluarsa').val(),
    }),
    success: function () {
      bootstrap.Modal.getInstance('#modalEdit').hide();
      tabel.ajax.reload();  // refresh tabel
      Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Data obat diperbarui.', timer: 1800, showConfirmButton: false });
    },
    error: function () {
      Swal.fire({ icon: 'error', title: 'Gagal', text: 'Terjadi kesalahan saat menyimpan.' });
    }
  });
});

// Klik HAPUS → tampilkan modal konfirmasi 
$(document).on('click', '.btn-hapus', function () {
  $('#hapusId').val($(this).data('id'));
  new bootstrap.Modal('#modalHapus').show();
});

// Konfirmasi hapus via DELETE 
$('#btnKonfirmasiHapus').on('click', function () {
  const id = $('#hapusId').val();

  $.ajax({
    url    : `/api/obat/${id}`,
    method : 'DELETE',
    success: function () {
      bootstrap.Modal.getInstance('#modalHapus').hide();
      tabel.ajax.reload();
      Swal.fire({ icon: 'success', title: 'Dihapus!', text: 'Data obat berhasil dihapus.', timer: 1800, showConfirmButton: false });
    },
    error: function () {
      Swal.fire({ icon: 'error', title: 'Gagal', text: 'Gagal menghapus data.' });
    }
  });
});
</script>

</body>
</html>
